services:

  db:
    image: postgres:14
    container_name: urlshortener_db
    restart: always
    environment:
      POSTGRES_DB: urlshortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: urlshortener_redis
    restart: always

  app:
    build: .
    container_name: urlshortener_app
    restart: always
    depends_on:
      - db
      - redis
    env_file:
      - .env
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: urlshortener_frontend
    restart: always
    depends_on:
      - app
    ports:
      - "3000:80"

volumes:
  postgres_data: